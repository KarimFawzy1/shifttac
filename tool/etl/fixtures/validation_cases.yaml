# Phase D12 — frozen QA cases against the shipped SQLite database.
#
# Re-run after each monthly CSV refresh (after build_database.py):
#   python tool/etl/run_validation_cases.py
#
# Optional: pass --db to point at tool/etl/output/tiki_taka.db instead of the asset.

version: "1"
db_path: assets/db/tiki_taka.db

cases:
