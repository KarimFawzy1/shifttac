    <polygon id="star"
      points="0,-1 0.29,-0.31 0.95,-0.31 0.42,0.12
              0.62,0.8 0,0.4 -0.62,0.8 -0.42,0.12
              -0.95,-0.31 -0.29,-0.31"/>
  </defs>

  <!-- 50 Stars (centered horizontally & vertically) -->
